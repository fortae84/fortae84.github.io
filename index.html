<!DOCTYPE html>
<html lang="kr">
  <head>
    <!-- Standard Meta -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>FORTAE IT 공장</title>

    <link
      rel="stylesheet"
      type="text/css"
      href="resources/semantic/semantic.min.css"
    />

    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1480551224756200"
      crossorigin="anonymous"
    ></script>

    <script src="resources/jquery/jquery-3.6.0.min.js"></script>
    <script src="resources/semantic/semantic.min.js"></script>
  </head>
  <body>
    <div class="context">
      <!-- 상단 메뉴 -->
      <div id="topMenuDiv" class="ui top attached menu">
        <a class="item">
          <i class="sidebar icon"></i>
        </a>
        <a class="header item" style="width: 206px" href="/"> Home </a>
      </div>

      <div class="ui bottom attached segment pushable">
        <!-- Sidebar -->
        <div
          class="ui vertical left visible sidebar menu"
          style="min-height: 800px"
        >
          <!-- 기타 -->

          <div class="ui card userInfo">
            <div class="image">
              <img src="./resources/img/avatar.png" />
            </div>
            <div class="content">
              <a class="header">
                <a id="userEmail" style="float: right" href="">
                  <i class="envelope icon"></i
                ></a>
              </a>
              <div class="meta">
                <span class="date"></span>
              </div>
              <div class="description"></div>
            </div>
          </div>

          <!--
          <a class="item">
            <i class="calendar icon"></i>
            History
          </a>
          -->

          <!-- 광고 -->
          <a class="item" style="padding: 0px; margin: 20px 0px 10px 0px">
            <center>
              <div class="ui half banner test ad" data-text="Half Banner"></div>
              <br />
              <div class="ui half banner test ad" data-text="Half Banner"></div>
            </center>
          </a>
        </div>

        <!-- 내용 -->
        <div id="contentDiv" class="pusher" style="min-height: 800px"></div>
      </div>
    </div>

    <script>
      $(function () {
        // Sidebar Event처리
        $(".context .ui.sidebar").sidebar({
          context: $(".context .bottom.segment"),
          closable: false,
          dimPage: false,
        });
        $(".context .ui.sidebar").sidebar("attach events", "i.sidebar");

        initPage();
      });

      function initPage() {
        // 사용자 기본 정보
        $(".userInfo .header").text("세렌디피티");
        $(".userInfo .date").text("Develop & Operate");
        $(".userInfo .description").text("순간 순간을 즐겨봐 carpe diem");
        $("#userEmail").prop("href", "mailto:fortae84@gmail.com");

        // 상단 Menu 구성
        for (var i = 0; i < menuList.length; i++) {
          // 1단 메뉴
          if (menuList[i].childList.length == 0) {
            $("#topMenuDiv").append(
              '<a class="header item" style="width: 206px"><div class="text">' +
                menuList[i].menuNm +
                "</div></a>"
            );
          } else {
            var menu =
              '<div class="header menuNo' +
              i +
              ' ui pointing dropdown link item" style="width: 206px;font-size:14px;">';

            menu += '<span class="text">' + menuList[i].menuNm + "</span>";
            menu += '<i class="dropdown icon"></i>';
            menu += '<div class="menu">';
            menu += '<div class="header">' + menuList[i].menuNm + "</div>";
            menu += '<div class="divider"></div>';
            for (var j = 0; j < menuList[i].childList.length; j++) {
              // 2단 메뉴
              if (menuList[i].childList[j].childList.length == 0) {
                menu +=
                  "<div onclick=\"loadPage('" +
                  menuList[i].childList[j].menuUrl +
                  '\');" class="item"> ' +
                  menuList[i].childList[j].menuNm;
              } else {
                menu += '<div class="item">' + menuList[i].childList[j].menuNm;
                // 3단메뉴
                if (menuList[i].childList[j].childList.length > 0) {
                  menu += ' <i class="dropdown icon"></i>';
                  menu += '<div class="menu">';

                  menu +=
                    "<div onclick=\"loadPage('" +
                    menuList[i].childList[j].menuUrl +
                    '\');" class="header item" style="font-weight:bold !important;padding-bottom:5px !important;font-size:13px !important;"> ' +
                    menuList[i].childList[j].menuNm +
                    "</div>";

                  menu += '<div class="divider"></div>';
                  for (
                    var k = 0;
                    k < menuList[i].childList[j].childList.length;
                    k++
                  ) {
                    menu +=
                      "<div onclick=\"loadPage('" +
                      menuList[i].childList[j].childList[k].menuUrl +
                      '\');" class="item"> ' +
                      menuList[i].childList[j].childList[k].menuNm +
                      "</div>";
                  }
                  menu += "</div>";
                }
              }
              menu += "</div>";
              //   menu +=
              //     '<div class="header">' +
              //     menuList[i].childList[j].menuNm +
              //     "</div>";
              //   menu += '<div class="divider"></div>';
              // }
            }
            menu += "</div>";
            menu += "</div>";
            $("#topMenuDiv").append(menu);
            $(".menuNo" + i).dropdown({
              action: "hide",
            });
          }
        }
      }

      function loadPage(url) {
        console.log(url);
        $("#contentDiv").empty();
        var iframeDvi =
          '<iframe src="' +
          url +
          '" style="width:100%; height:' +
          ($(window).height() - 50) +
          'px; border:none"></iframe>';

        $("#contentDiv").append(iframeDvi);
      }

      /**














      **/
      var menuList = [
        {
          menuNm: "Infra",
          menuUrl: "",
          childList: [
            {
              menuNm: "Docker",
              menuUrl: "./md/docker/index.html",
              childList: [
                {
                  menuNm: "Docker Image 관리",
                  menuUrl: "./md/docker/imgMnt/index.html",
                  childList: [],
                },
              ],
            },
            {
              menuNm: "Kubernetes",
              menuUrl: "./md/kubernetes/index.html",
              childList: [],
            },
          ],
        },
        {
          menuNm: "소프트웨어",
          menuUrl: "",
          childList: [],
        },
        {
          menuNm: "프로그래밍",
          menuUrl: "",
          childList: [
            {
              menuNm: "Markdown",
              menuUrl: "./md/markdown/index.html",
              childList: [],
            },
            {
              menuNm: "Flutter",
              menuUrl: "./md/flutter/index.html",
              childList: [],
            },
          ],
        },
        {
          menuNm: "개인 프로젝트",
          menuUrl: "",
          childList: [],
        },
        {
          menuNm: "관심사",
          menuUrl: "",
          childList: [],
        },
      ];
    </script>
  </body>
</html>
