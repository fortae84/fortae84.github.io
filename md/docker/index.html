<h2><strong>Docker</strong></h2>
<ul>
<li>Linux Container화 기술</li>
<li>애플리케이션의 실행 환경을 구축 및 운영하기 위한 플랫폼

<li><strong>Build</strong>: Docker 이미지를 만드는 기능</li>
