<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Markdown Viewer</title>
  </head>
  <body id="markdown-contents">
    <script
      type="text/javascript"
      src="resources/jquery/jquery-3.6.0.min.js"
    ></script>

    <script
      type="text/javascript"
      src="resources/showdownjs/dist/showdown.min.js"
    ></script>

    <script type="text/javascript">
      var path = "https://fortae84.github.io/markdown/markdown.md";
      var converter = new showdown.Converter();
      $("#markdown-contents").html(converter.makeHtml(path));
    </script>
  </body>
</html>
