<!DOCTYPE html>
<htm lang="kr">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Markdown Viewer</title>
  </head>
  <body id="mdid">
    <div id="markdown-contents" style="display: none"></div>

    <script
      type="text/javascript"
      src="resources/jquery/jquery-3.6.0.min.js"
    ></script>
    <script
      type="text/javascript"
      src="resources/showdownjs/dist/showdown.min.js"
    ></script>

    <script type="text/javascript">
      $(function () {
        var path = "https://fortae84.github.io/markdown/markdown.md";
        $("#markdown-contents").load(path);
        var convertor = new showdown.Converter();
        $("#mdid").html(convertor.makeHtml($("#markdown-contents").html()));
      });
    </script>
  </body>
</htm>
